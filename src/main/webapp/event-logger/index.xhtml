<ui:composition
        xmlns:h="jakarta.faces.html"
        xmlns:f="jakarta.faces.core"
        xmlns:faces="jakarta.faces"
        xmlns:ui="jakarta.faces.facelets"
        xmlns="http://www.w3.org/1999/xhtml"
        template="/WEB-INF/layout/public.xhtml">
    <ui:define name="title"><i class="bi bi-phone me-2"></i>Mobile Event Logger</ui:define>
    <ui:define name="metadata">
        <f:metadata>
            <f:viewAction action="#{eventLogger.init()}"/>
        </f:metadata>
    </ui:define>
    <ui:define name="subtitle">Log cargo handling events on the go</ui:define>
    <ui:define name="content">

        <div class="card form-card event-logger-form">
            <div class="card-body p-4">
                <form faces:id="eventLoggerForm" class="row g-3 needs-validation" novalidate="true">
                    <div class="col-12 col-md-6">
                        <label for="trackingId" class="form-label">Tracking ID</label>
                        <h:selectOneMenu id="trackingId"
                                         styleClass="form-select #{not empty facesContext.getMessageList('eventLoggerForm:trackingId')?'is-invalid':''}"
                                         value="#{eventLogger.trackingId}"
                                         required="true"
                                         requiredMessage="Tracking ID missing">
                            <f:selectItem itemLabel="Select Tracking ID" itemValue=""
                                          noSelectionOption="true"/>
                            <f:selectItems value="#{eventLogger.trackingIds}"/>
                        </h:selectOneMenu>
                        <small class="invalid-feedback">
                            <h:message for="eventLoggerForm:trackingId" showDetail="false" showSummary="true"/>
                        </small>
                    </div>
                    <div class="col-12 col-md-6">
                        <label for="locationId" class="form-label">Location</label>
                        <h:selectOneMenu id="locationId"
                                         styleClass="form-select #{not empty facesContext.getMessageList('eventLoggerForm:locationId')?'is-invalid':''}"
                                         value="#{eventLogger.location}"
                                         required="true"
                                         requiredMessage="Location missing">
                            <f:selectItem itemLabel="Select Location" itemValue=""
                                          noSelectionOption="true"/>
                            <f:selectItems value="#{eventLogger.locations}"/>
                        </h:selectOneMenu>
                        <small class="invalid-feedback">
                            <h:message for="eventLoggerForm:locationId" showDetail="false" showSummary="true"/>
                        </small>
                    </div>

                    <div class="col-12 col-md-6">
                        <label for="eventType" class="form-label">Event Type</label>
                        <h:selectOneMenu id="eventType"
                                         styleClass="form-select #{not empty facesContext.getMessageList('eventLoggerForm:eventType')?'is-invalid':''}"
                                         value="#{eventLogger.eventType}"
                                         requiredMessage="Event type missing"
                                         required="true">
                            <f:selectItem itemLabel="Select Event Type" itemValue=""
                                          noSelectionOption="true"/>
                            <!-- TODO [DDD] This should be retrieved from the domain model. -->
                            <f:selectItem itemLabel="RECEIVE" itemValue="RECEIVE"/>
                            <f:selectItem itemLabel="LOAD" itemValue="LOAD"/>
                            <f:selectItem itemLabel="UNLOAD" itemValue="UNLOAD"/>
                            <f:selectItem itemLabel="CUSTOMS" itemValue="CUSTOMS"/>
                            <f:selectItem itemLabel="CLAIM" itemValue="CLAIM"/>
                        </h:selectOneMenu>
                        <small class="invalid-feedback">
                            <h:message for="eventLoggerForm:eventType" showDetail="false" showSummary="true"/>
                        </small>
                    </div>

                    <div class="col-12 col-md-6">
                        <label for="voyage" class="form-label">Voyage <span class="text-muted fw-normal">(optional)</span></label>
                        <h:selectOneMenu id="voyage"
                                         styleClass="form-select #{not empty facesContext.getMessageList('eventLoggerForm:voyage')?'is-invalid':''}"
                                         value="#{eventLogger.voyageNumber}"
                                         required="false">
                            <f:selectItem itemLabel="Select Voyage" itemValue=""
                                          noSelectionOption="true"/>
                            <f:selectItems value="#{eventLogger.voyages}"/>
                        </h:selectOneMenu>
                        <small class="invalid-feedback">
                            <h:message for="eventLoggerForm:voyage" showDetail="false" showSummary="true"/>
                        </small>
                    </div>

                    <div class="col-12 col-md-6">
                        <label for="completionDate" class="form-label">Completion Date</label>
                        <input type="datetime-local"
                               faces:id="completionDate"
                               class="form-control #{not empty facesContext.getMessageList('eventLoggerForm:completionDate')?'is-invalid':''}"
                               faces:value="#{eventLogger.completionTime}">
                            <f:convertDateTime type="localDateTime" pattern="yyyy-MM-dd'T'HH:mm"/>
                        </input>
                        <small class="invalid-feedback">
                            <h:message for="eventLoggerForm:completionDate" showDetail="false" showSummary="true"/>
                        </small>
                    </div>
                    <div class="col-12 mt-3">
                        <button class="btn btn-primary btn-lg px-5"
                                faces:action="#{eventLogger.submit()}">
                            <i class="bi bi-send me-1"></i> Submit Event
                        </button>
                    </div>
                </form>
            </div>
        </div>

    </ui:define>
</ui:composition>
