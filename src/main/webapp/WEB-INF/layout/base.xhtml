<!DOCTYPE html>
<html xmlns:ui="jakarta.faces.facelets"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:faces="jakarta.faces"
      lang="en">
<f:view>
    <ui:insert name="metadata"></ui:insert>
    <head>
        <!-- Required meta tags -->
        <meta charset="utf-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1"/>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
              rel="stylesheet"
              integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
              crossorigin="anonymous"/>

        <link rel="stylesheet"
              href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"/>

        <!-- Application styles -->
        <link rel="stylesheet" href="#{resource['css/app.css']}"/>

        <ui:insert name="headIncludes"></ui:insert>
        <title>CargoTracker — A Jakarta EE blueprint application</title>
    </head>
    <body>
        <ui:insert name="nav"></ui:insert>
        <main class="container">
            <ui:include src="/WEB-INF/layout/alert.xhtml"></ui:include>
            <ui:insert name="body"></ui:insert>
        </main>
        <footer id="footer">
            <ui:include src="/WEB-INF/layout/footer.xhtml"></ui:include>
        </footer>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
                integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
                crossorigin="anonymous">
            <!-- stop closing -->
        </script>
        <ui:insert name="bodyIncludes"></ui:insert>
    </body>
</f:view>
</html>
