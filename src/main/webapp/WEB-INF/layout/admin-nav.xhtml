<ui:composition xmlns:ui="jakarta.faces.facelets"

        <div class="container">
            <a faces:outcome="/admin/dashboard.xhtml" class="navbar-brand d-flex align-items-center gap-2">

                <span class="fw-bold d-none d-md-inline">Cargo Tracker</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a faces:outcome="/admin/dashboard.xhtml" class="nav-link #{request.requestURI.startsWith(request.contextPath.concat('/admin/dashboard.xhtml'))?'active fw-semibold':''}">Dashboard</a>
