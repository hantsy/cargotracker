<ui:composition
        xmlns:h="jakarta.faces.html"
        xmlns:f="jakarta.faces.core"
        xmlns:faces="jakarta.faces"
        xmlns:ui="jakarta.faces.facelets"
        xmlns="http://www.w3.org/1999/xhtml"
        template="/WEB-INF/layout/admin.xhtml">
    <ui:define name="metadata">
        <f:metadata>
            <f:event listener="#{booking.startConversation()}" type="preRenderView"/>
        </f:metadata>
    </ui:define>
    <ui:define name="title">Cargo Registration</ui:define>
    <ui:define name="subtitle">Book a new Cargo</ui:define>
    <ui:define name="content">

        <div class="card form-card">
            <div class="card-body p-4">
                <form faces:id="registrationForm" class="row g-3 needs-validation" novalidate="true">

                    <div class="col-12 col-md-6">
                        <label for="origin" class="form-label fw-semibold">
                            <i class="bi bi-geo-alt me-1"></i> Origin
                        </label>
                        <h:selectOneMenu id="origin"
                                         styleClass="form-select #{not empty facesContext.getMessageList('registrationForm:origin')?'is-invalid':''}"
                                         value="#{booking.originUnlocode}"
                                         required="true"
                                         requiredMessage="Origin is required.">
                            <f:selectItems value="#{booking.locations}" var="location"
                                           itemLabel="#{location.nameAndCode()}" itemValue="#{location.code}"/>
                        </h:selectOneMenu>
                        <small class="invalid-feedback">
                            <h:message for="registrationForm:origin" showDetail="false" showSummary="true"/>
                        </small>
                    </div>

                    <div class="col-12 col-md-6">
                        <label for="destination" class="form-label fw-semibold">
                            <i class="bi bi-geo-alt-fill me-1"></i> Destination
                        </label>
                        <h:selectOneMenu id="destination"
                                         styleClass="form-select #{not empty facesContext.getMessageList('registrationForm:destination')?'is-invalid':''}"
                                         value="#{booking.destinationUnlocode}"
                                         required="true"
                                         requiredMessage="Destination is required.">
                            <f:selectItems value="#{booking.locations}" var="location"
                                           itemLabel="#{location.nameAndCode()}" itemValue="#{location.code}"/>
                        </h:selectOneMenu>
                        <small class="invalid-feedback">
                            <h:message for="registrationForm:destination" showDetail="false" showSummary="true"/>
                        </small>
                    </div>

                    <div class="col-12 col-md-6">
                        <label for="deadline" class="form-label fw-semibold">
                            <i class="bi bi-calendar me-1"></i> Arrival Deadline
                        </label>
                        <input type="date"
                               faces:id="deadline"
                               min="#{booking.today}"
                               class="form-control #{not empty facesContext.getMessageList('registrationForm:deadline')?'is-invalid':''}"
                               faces:value="#{booking.arrivalDeadline}"
                               faces:required="true"
                               faces:requiredMessage="ArrivalDeadline is required.">
                            <f:convertDateTime type="localDate" pattern="yyyy-MM-dd"/>
                        </input>
                        <small class="invalid-feedback">
                            <h:message for="registrationForm:deadline" showDetail="false" showSummary="true"/>
                        </small>
                    </div>
                    <div class="d-flex gap-3 col-12 mt-3">
                        <a faces:outcome="/admin/dashboard.xhtml" class="btn btn-outline-secondary">Cancel</a>
                        <button class="btn btn-primary px-4" faces:action="#{booking.submit()}">
                            <i class="bi bi-arrow-right me-1"></i> Submit
                        </button>
                    </div>
                </form>
            </div>
        </div>

    </ui:define>
</ui:composition>
