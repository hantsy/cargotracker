<ui:composition xmlns:ui="jakarta.faces.facelets"
                xmlns:f="jakarta.faces.core"
                xmlns:h="jakarta.faces.html"
                xmlns="http://www.w3.org/1999/xhtml">
    <div class="table-card card">
        <div class="card-header">
            <h2 class="fs-5 fw-bold mb-0">
                <i class="bi bi-archive text-secondary me-2"></i>Claimed Cargo
            </h2>
        </div>

        <ui:fragment rendered="#{empty listCargo.claimedCargos}">
            <div class="card-body">
                <p class="text-muted mb-0">No claimed cargos.</p>
            </div>
        </ui:fragment>

        <ui:fragment rendered="#{not empty listCargo.claimedCargos}">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th scope="col">Tracking ID</th>
                        <th scope="col">Origin</th>
                        <th scope="col">Destination</th>
                        <th scope="col">Deadline</th>
                    </tr>
                    </thead>
                    <tbody>
                    <ui:repeat var="cargo" value="#{listCargo.claimedCargos}">
                        <tr>
                            <td>
                                <h:link value="#{cargo.trackingId}"
                                        outcome="show.xhtml?faces-redirect=true"
                                        styleClass="fw-semibold text-decoration-none">
                                    <f:param name="trackingId" value="#{cargo.trackingId}"/>
                                </h:link>
                            </td>
                            <td>
                                <div class="fw-semibold">#{cargo.origin.name}</div>
                                <small class="text-muted">#{cargo.origin.code}</small>
                            </td>
                            <td>
                                <div class="fw-semibold">#{cargo.finalDestination.name}</div>
                                <small class="text-muted">#{cargo.finalDestination.code}</small>
                            </td>
                            <td>#{cargo.arrivalDeadline}</td>
                        </tr>
                    </ui:repeat>
                    </tbody>
                </table>
            </div>
        </ui:fragment>
    </div>
</ui:composition>
