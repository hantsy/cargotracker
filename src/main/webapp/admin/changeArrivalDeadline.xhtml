<ui:composition
        xmlns:h="jakarta.faces.html"
        xmlns:f="jakarta.faces.core"
        xmlns:faces="jakarta.faces"
        xmlns:ui="jakarta.faces.facelets"
        xmlns="http://www.w3.org/1999/xhtml"
        template="/WEB-INF/layout/admin.xhtml">
    <ui:define name="metadata">
        <f:metadata>
            <f:viewParam name="trackingId" value="#{changeArrivalDeadline.trackingId}"/>
            <f:viewAction action="#{changeArrivalDeadline.load}"/>
        </f:metadata>
    </ui:define>
    <ui:define name="title">Change Arrival Deadline</ui:define>
    <ui:define name="subtitle">Change Arrival Deadline for Cargo #{changeArrivalDeadline.cargo.trackingId}</ui:define>
    <ui:define name="content">

        <div class="card form-card">
            <div class="card-body p-4">
                <form faces:id="changeArrivalDeadlineForm" class="row g-3 needs-validation" novalidate="true">
                    <div class="col-12">
                        <div class="row g-3">
                            <div class="col-12 col-md-6">
                                <div class="text-muted small text-uppercase fw-semibold mb-1">Origin</div>
                                <div class="fw-bold">#{changeArrivalDeadline.cargo.origin.name}</div>
                            </div>
                            <div class="col-12 col-md-6">
                                <div class="text-muted small text-uppercase fw-semibold mb-1">Destination</div>
                                <div class="fw-bold">#{changeArrivalDeadline.cargo.finalDestination.name}</div>
                            </div>
                        </div>
                    </div>

                    <div class="col-12">
                        <label for="deadline" class="form-label fw-semibold">New Arrival Deadline</label>
                        <input type="date"
                               faces:id="deadline"
                               class="form-control form-control-lg #{not empty facesContext.getMessageList('changeArrivalDeadlineForm:deadline')?'is-invalid':''}"
                               faces:value="#{changeArrivalDeadline.arrivalDeadline}"
                               faces:required="true"
                               faces:requiredMessage="ArrivalDeadline is required.">
                            <f:convertDateTime type="localDate" pattern="yyyy-MM-dd"/>
                        </input>
                        <small class="invalid-feedback">
                            <h:message for="changeArrivalDeadlineForm:deadline" showDetail="false" showSummary="true"/>
                        </small>
                    </div>
                    <div class="d-flex gap-3 col-12 mt-3">
                        <a faces:outcome="/admin/dashboard.xhtml" class="btn btn-outline-secondary">Cancel</a>
                        <button class="btn btn-primary px-4" faces:action="#{changeArrivalDeadline.changeArrivalDeadline()}">
                            <i class="bi bi-check-lg me-1"></i> Update
                        </button>
                    </div>
                </form>
            </div>
        </div>

    </ui:define>
</ui:composition>
